services:
  postgres:
    image: postgres:16-alpine
    container_name: llmetrics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      timeout: 20s
      retries: 10
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmetrics_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      VIRTUAL_HOST: api.llmetrics.localhost
      VIRTUAL_PORT: 8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
    expose:
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - nginx-proxy-network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmetrics_queue_worker
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
      QUEUE_CONNECTION: database
    command: php artisan queue:work --delay=3 --max-jobs=1000 --max-time=3600
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - default
    restart: unless-stopped

  frontend:
    image: node:20-bullseye
    container_name: llmetrics_frontend
    working_dir: /web
    volumes:
      - ./frontend:/web
    command: sh -c "npm install && npm run dev"
    environment:
      VIRTUAL_HOST: llmetrics.localhost
      VIRTUAL_PORT: 3000
    extra_hosts:
      - "api.llmetrics.localhost:host-gateway"
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - default
      - nginx-proxy-network

volumes:
  postgres_data:
    driver: local

networks:
  nginx-proxy-network:
    external: true
    name: nginx-proxy-network