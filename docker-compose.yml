services:
  mysql:
    image: mysql:8.0
    container_name: llmetrics_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3305:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmetrics_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    labels:
      com.github.jrcs.letsencrypt_nginx_proxy_companion.main_domain: api.llmetrics.localhost
    environment:
      VIRTUAL_HOST: api.llmetrics.localhost
      VIRTUAL_PORT: 8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - default
      - nginx-proxy-network

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmetrics_queue_worker
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
      QUEUE_CONNECTION: database
      CONTAINER_TYPE: queue-worker
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - default
    restart: unless-stopped

  frontend:
    image: node:20-bullseye
    container_name: llmetrics_frontend
    working_dir: /web
    volumes:
      - ./frontend:/web
    command: sh -c "npm install && npm run dev"
    environment:
      VIRTUAL_HOST: llmetrics.localhost
      VIRTUAL_PORT: 3000
      NEXT_PUBLIC_API_URL: http://api.llmetrics.localhost
    extra_hosts:
      - "api.llmetrics.localhost:host-gateway"
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - default
      - nginx-proxy-network

volumes:
  mysql_data:
    driver: local

networks:
  nginx-proxy-network:
    external: true
    name: nginx-proxy-network